name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # next-env.d.ts (asset/route type declarations) is generated, not
      # committed - without it, tsc fails on the PNG import in a fresh clone.
      - name: Generate Next.js types
        run: npx next typegen

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
